name: CopyPathAs
options:
  bundleIdPrefix: com.vfedoroff
  deploymentTarget:
    macOS: "15.0"
configFiles:
  Debug: Configs/Config.xcconfig
  Release: Configs/Config.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "3"
targets:
  CopyPathCore:
    type: framework
    platform: macOS
    sources: [Sources/CopyPathCore]
    info:
      path: Sources/CopyPathCore/Info.plist
      properties:
        CFBundlePackageType: FMWK
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vfedoroff.CopyPathAs.Core
        APPLICATION_EXTENSION_API_ONLY: YES
        DEFINES_MODULE: YES
  CopyPathAs:
    type: application
    platform: macOS
    sources: [Sources/CopyPathAs]
    info:
      path: Sources/CopyPathAs/Info.plist
      properties:
        CFBundleDisplayName: "Copy Path As"
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: ""
    dependencies:
      - target: CopyPathCore
        embed: true
      - target: CopyPathFinderExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vfedoroff.CopyPathAs
        PRODUCT_NAME: CopyPathAs
        CODE_SIGN_ENTITLEMENTS: $(ENTITLEMENTS_HOST)
        PROVISIONING_PROFILE_SPECIFIER: $(PROVISIONING_PROFILE_SPECIFIER_HOST)
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  CopyPathFinderExtension:
    type: app-extension
    platform: macOS
    sources: [Sources/CopyPathFinderExtension]
    info:
      path: Sources/CopyPathFinderExtension/Info.plist
      properties:
        CFBundleDisplayName: "Copy Path As"
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FinderSync
    dependencies:
      - target: CopyPathCore
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vfedoroff.CopyPathAs.FinderExtension
        PRODUCT_NAME: CopyPathFinderExtension
        CODE_SIGN_ENTITLEMENTS: $(ENTITLEMENTS_EXTENSION)
        PROVISIONING_PROFILE_SPECIFIER: $(PROVISIONING_PROFILE_SPECIFIER_EXTENSION)
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  CopyPathTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CopyPathTests
      - Sources/CopyPathAs/AppDemoState.swift
      - Sources/CopyPathAs/AppLifecycleDelegate.swift
      - Sources/CopyPathAs/FinderExtensionManager.swift
      - path: Sources/CopyPathFinderExtension
        excludes:
          - Info.plist
          - CopyPathFinderExtension.entitlements
    dependencies:
      - target: CopyPathCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vfedoroff.CopyPathAs.Tests
  CopyPathUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [Tests/CopyPathUITests]
    dependencies:
      - target: CopyPathAs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vfedoroff.CopyPathAs.UITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CopyPathAs
schemes:
  CopyPathAs:
    build:
      targets:
        CopyPathAs: all
        CopyPathTests: [test]
    test:
      targets:
        - CopyPathTests
        - CopyPathUITests
  CopyPathUnitTests:
    build:
      targets:
        CopyPathTests: [test]
    test:
      targets:
        - CopyPathTests
  CopyPathFinderExtension:
    build:
      targets:
        CopyPathFinderExtension: all
    run:
      config: Debug
