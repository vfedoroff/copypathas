name: Release Follow-up

on:
  release:
    types: [published]

jobs:
  update-homebrew-tap:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Homebrew Tap Cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=${GITHUB_REF_NAME#v}

          mkdir -p build
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "CopyPathAs.dmg" \
            --dir build

          SHA256=$(shasum -a 256 build/CopyPathAs.dmg | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/vfedoroff/homebrew-tap.git homebrew-tap

          python3 -c "
          import re
          path = 'homebrew-tap/Casks/copypathas.rb'
          with open(path, 'r') as f:
              content = f.read()
          content = re.sub(r'  version \".*?\"', f'  version \"$VERSION\"', content)
          content = re.sub(r'  sha256 \".*?\"', f'  sha256 \"$SHA256\"', content)
          with open(path, 'w') as f:
              f.write(content)
          "

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/copypathas.rb
          if git diff --cached --quiet; then
            echo "Homebrew cask already up to date."
          else
            git commit -m "Update copypathas to $VERSION"
            git push
          fi
